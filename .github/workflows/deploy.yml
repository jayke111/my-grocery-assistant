name: Deploy to Firebase

on:
  push:
    branches:
      - main # This will trigger the deployment when you push to your main branch

jobs:
  deploy:
    # This gives the workflow the permissions it needs to get a token from GitHub
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # This is the keyless authentication step. It provides the credentials.
      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions-deployer@cartspark-85cbc.iam.gserviceaccount.com'

      - name: Install dependencies for functions
        run: npm --prefix functions install

      # --- THIS IS THE FINAL, CORRECTED DEPLOY STEP ---
      # We use a dedicated action that is designed to work with the authenticated session.
      # The unnecessary 'env' block has been removed.
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          action: deploy
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          # The firebase_token is automatically handled by the action using the authenticated session
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
          only: 'functions'
