name: Deploy to Firebase

on:
  push:
    branches:
      - main # This will trigger the deployment when you push to your main branch

jobs:
  deploy:
    # This gives the workflow the permissions it needs to get a token from GitHub
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # This is the keyless authentication step. It provides the credentials.
      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions-deployer@cartspark-85cbc.iam.gserviceaccount.com'

      - name: Install dependencies for functions
        run: npm --prefix functions install

      # --- THIS IS THE NEW, FINAL DEPLOY STEP ---
      # We now use the gcloud CLI directly, which is more robust.
      - name: Deploy to Firebase using gcloud
        run: |
          gcloud functions deploy onusercreate \
            --gen2 \
            --runtime=nodejs20 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=us-central1 \
            --source=functions \
            --entry-point=onusercreate \
            --trigger-event-filters="type=google.firebase.auth.user.v1.created"
            
          gcloud functions deploy createstripecheckout \
            --gen2 \
            --runtime=nodejs20 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=us-central1 \
            --source=functions \
            --entry-point=createstripecheckout \
            --trigger-http \
            --no-allow-unauthenticated

          gcloud functions deploy stripewebhook \
            --gen2 \
            --runtime=nodejs20 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=us-central1 \
            --source=functions \
            --entry-point=stripewebhook \
            --trigger-http \
            --allow-unauthenticated
