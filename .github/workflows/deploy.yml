# This is a basic workflow to help you get started with Actions

name: Deploy to Firebase

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          action: deploy
          # --- THIS IS THE FIX ---
          # We are now hardcoding the project ID directly.
          project_id: 'cartspark-85cbc'
          only: 'functions'
        env:
          # This token is a secret that allows GitHub to authenticate with Firebase.
          # It should already be configured in your repository secrets.
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
