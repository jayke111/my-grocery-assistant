name: Deploy to Firebase

on:
  push:
    branches:
      - main # This will trigger the deployment when you push to your main branch

jobs:
  deploy:
    # This gives the workflow the permissions it needs to get a token from GitHub
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # This is the new, keyless authentication step
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions-deployer@cartspark-85cbc.iam.gserviceaccount.com'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies for functions
        run: npm --prefix functions install

      # --- THIS STEP IS NOW CORRECTED ---
      # We now generate a token and pass it directly to the deploy command.
      - name: Deploy to Firebase
        run: |
          firebase deploy --project ${{ secrets.GCP_PROJECT_ID }} --only functions --force --token ${{ steps.auth.outputs.access_token }}
        id: auth # Give the auth step an ID to reference its outputs
